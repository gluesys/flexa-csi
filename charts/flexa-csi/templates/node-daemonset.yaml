apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "flexa-csi.fullname" . }}-node
  namespace: {{ include "flexa-csi.namespace" . }}
  labels:
    {{- include "flexa-csi.labels" . | nindent 4 }}
    app.kubernetes.io/component: node
spec:
  selector:
    matchLabels:
      {{- include "flexa-csi.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: node
  template:
    metadata:
      labels:
        {{- include "flexa-csi.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: node
        {{- with .Values.node.labels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.node.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "flexa-csi.fullname" . }}-node-sa
      hostNetwork: {{ .Values.node.hostNetwork }}
      {{- with .Values.node.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.node.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.node.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: csi-driver-registrar
          securityContext:
            privileged: true
          imagePullPolicy: {{ .Values.sidecars.registrar.pullPolicy }}
          image: "{{ .Values.sidecars.registrar.repository }}:{{ .Values.sidecars.registrar.tag }}"
          args:
            - --v=5
            - --csi-address=$(ADDRESS)
            - --kubelet-registration-path=$(REGISTRATION_PATH)
          env:
            - name: ADDRESS
              value: /csi/csi.sock
            - name: REGISTRATION_PATH
              value: {{ .Values.node.kubeletPath }}/plugins/csi.flexa.com/csi.sock
            - name: KUBE_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          volumeMounts:
            - name: plugin-dir
              mountPath: /csi
            - name: registration-dir
              mountPath: /registration
        - name: csi-plugin
          securityContext:
            privileged: true
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          args:
            - --nodeid=$(KUBE_NODE_NAME)
            - --endpoint=$(CSI_ENDPOINT)
            - --client-info
            - /etc/flexa/client-info.yml
            - --log-level={{ .Values.logLevel }}
          env:
            - name: CSI_ENDPOINT
              value: unix://csi/csi.sock
            - name: KUBE_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          volumeMounts:
            - name: kubelet-dir
              mountPath: /var/lib/kubelet
              mountPropagation: Bidirectional
            - name: plugin-dir
              mountPath: /csi
            - name: client-info
              mountPath: /etc/flexa
              readOnly: true
            - name: host-root
              mountPath: /host
            - name: device-dir
              mountPath: /dev
            - name: flexa-meta-dir
              mountPath: /var/lib/flexa/meta
            - name: flexa-group-mount-dir
              mountPath: /mnt/flexa
          {{- with .Values.node.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: kubelet-dir
          hostPath:
            path: {{ .Values.node.kubeletPath }}
            type: Directory
        - name: plugin-dir
          hostPath:
            path: {{ .Values.node.pluginDir }}
            type: DirectoryOrCreate
        - name: registration-dir
          hostPath:
            path: {{ .Values.node.registrationDir }}
            type: Directory
        - name: client-info
          secret:
            secretName: {{ .Values.clientInfo.secretName }}
        - name: host-root
          hostPath:
            path: /
            type: Directory
        - name: device-dir
          hostPath:
            path: /dev
            type: Directory
        - name: flexa-meta-dir
          hostPath:
            path: {{ .Values.node.flexaMetaPath }}
            type: DirectoryOrCreate
        - name: flexa-group-mount-dir
          hostPath:
            path: {{ .Values.node.flexaGroupMountPath }}
            type: DirectoryOrCreate
