apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "flexa-csi.fullname" . }}-node-sa
  namespace: {{ include "flexa-csi.namespace" . }}
  labels:
    {{- include "flexa-csi.labels" . | nindent 4 }}
    app.kubernetes.io/component: node
---
kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: {{ include "flexa-csi.fullname" . }}-node-role
  labels:
    {{- include "flexa-csi.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "update"]
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["persistentvolumes"]
    verbs: ["get", "list", "watch", "update"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["volumeattachments"]
    verbs: ["get", "list", "watch", "update"]
---
kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: {{ include "flexa-csi.fullname" . }}-node-rolebinding
  labels:
    {{- include "flexa-csi.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "flexa-csi.fullname" . }}-node-sa
    namespace: {{ include "flexa-csi.namespace" . }}
roleRef:
  kind: ClusterRole
  name: {{ include "flexa-csi.fullname" . }}-node-role
  apiGroup: rbac.authorization.k8s.io
